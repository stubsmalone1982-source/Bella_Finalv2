<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>...</title>

<style>

@font-face {
  font-family: "Cormorant";
  src: url("assets/CormorantGaramond-VariableFont_wght.ttf");
}

@font-face {
  font-family: "MoonDance";
  src: url("assets/MoonDance-Regular.ttf");
}

html, body {
  margin: 0;
  height: 100%;

  background:
    radial-gradient(
      circle at center,
      rgba(60,30,120,0.35) 0%,
      rgba(10,6,18,0.9) 50%,
      rgba(0,0,0,1) 85%
    );

  display: flex;
  align-items: center;
  justify-content: center;

}

#text {

  font-family: "MoonDance", serif;
  font-size: 52px;
  letter-spacing: 1px;

  white-space: nowrap;
  overflow: hidden;
  width: 0;

  border-right: 2px solid rgba(200,180,255,0.6);

  animation:
    typing 1.6s steps(30,end) forwards,
    caretBlink 1s infinite;

    color: rgba(185,190,200,0.92);
    text-shadow:
    0 1px 6px rgba(255,255,255,0.05),
    0 0 14px rgba(180,190,210,0.25);
}

@keyframes typing {
  from { width: 0 }
  to { width: 100% }
}

@keyframes caretBlink {
  50% { border-color: transparent }
}

</style>
</head>

<body>

<div id="text">There you are, hey sweetheart</div>

<script>

const text = document.getElementById("text");

setTimeout(() => {
  text.style.opacity = 1;
}, 300);

setTimeout(() => {
  text.style.opacity = 0;
}, 2400);

setTimeout(() => {
  window.location.replace("https://us05web.zoom.us/j/8376488082");
}, 4300);

</script>

</body>
</html>
